<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Миний танилцуулга</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="hero">
    <nav class="nav">
      <div class="logo">Portfolio</div>
      <ul class="nav-links">
        <li><a href="#about">Тухай</a></li>
        <li><a href="#skills">Ур чадвар</a></li>
        <li><a href="#projects">Төслүүд</a></li>
        <li><a href="#contact">Холбоо барих</a></li>
      </ul>
    </nav>
    <div class="hero-content">
      <h1>Сайн байна уу 👋</h1>
      <p>Намайг [Таны нэр] гэдэг. Web хөгжүүлэгч.</p>
    </div>
  </header>

  <section id="about" class="section">
    <h2>Миний тухай</h2>
    <p>Энд өөрийнхөө тухай товч танилцуулга бичнэ үү.</p>
  </section>

  <section id="skills" class="section">
    <h2>Ур чадварууд</h2>
    <div id="skills-list" class="skills-grid">
      <p class="loading">Уншиж байна...</p>
    </div>
  </section>

  <section id="projects" class="section">
    <h2>Төслүүд</h2>
    <div id="projects-list" class="projects-grid">
      <p class="loading">Уншиж байна...</p>
    </div>
  </section>

  <section id="contact" class="section">
    <h2>Холбоо барих</h2>
    <form id="contact-form" class="contact-form">
      <input type="text" id="name" placeholder="Таны нэр" required />
      <input type="email" id="email" placeholder="И-мэйл" required />
      <textarea id="message" placeholder="Мессеж" rows="5" required></textarea>
      <button type="submit">Илгээх</button>
      <p id="contact-status" class="status"></p>
    </form>
  </section>

  <footer class="footer">
    <p>&copy; 2026 Portfolio. <a href="admin.html">Admin</a></p>
  </footer>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
